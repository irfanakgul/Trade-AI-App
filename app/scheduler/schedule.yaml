timezone: Europe/Amsterdam
run_days: [MON, TUE, WED, THU, FRI, SAT, SUN]
poll_interval_seconds: 60

jobs:

    # daily calculations (raw+working+trim+focus)
  - name: bist_daily_calc
    run_days: [MON, TUE, WED, THU, FRI]
    at: "12:26"
    cmd: ".venv/bin/python -u main_bist_daily_data.py"
    lock: "bist_daily_calc"

  - name: bist_indicators
    # run_days: [SUN] #remove if u will use depends on
    # at: "23:27" #remove if u will use depends on
    depends_on: "bist_daily_calc" #open for depends usage
    cmd: ".venv/bin/python -u main_bist_indicators.py"
    lock: "bist_indicators"

  - name: bist_batch #min data update
    # run_days: [MON, TUE, WED, THU, FRI]
    # at: "21:45"
    depends_on: "bist_indicators" #open for depends usage
    cmd: ".venv/bin/python -u main_bist_data.py"
    lock: "bist_pull_1min"

  - name: usa_batch
    run_days: [MON, TUE, WED, THU, FRI, SAT]
    at: "12:48"
    cmd: ".venv/bin/python -u main_usa_data.py"
    lock: "usa_batch"

  - name: usa_indicators
    depends_on: "usa_batch"  #"bist_batch" #open for depends usage
    # run_days: [SUN] #remove if u will use depends on
    # at: "23:32" #remove if u will use depends on
    cmd: ".venv/bin/python -u main_usa_indicators.py"
    lock: "usa_indicators"
